# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Freezed + json_annotation: @JsonKey on constructor params is intentional.
    # The analyzer raises false positives because it doesn't understand Freezed's
    # code generation — these annotations ARE on the right targets after codegen.
    invalid_annotation_target: ignore
    # Pre-existing unused members — not bugs, not causing any runtime issues.
    unused_field: ignore
    unused_element: ignore
    unused_local_variable: ignore
    # Cosmetic naming conventions — no correctness impact.
    constant_identifier_names: ignore
    file_names: ignore
    camel_case_types: ignore

linter:
  rules:
    # print() is fine in this mobile app — we do not use a logging framework.
    avoid_print: false
